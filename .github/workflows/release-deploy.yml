name: Liberacion y Despliegue Calculadora

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  liberacion:
    name: Liberacion continua
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Validar archivos del proyecto
        run: npm test

      - name: Generar entorno de liberacion
        run: npm run build

      - name: Probar entorno de liberacion
        run: npm run test:release

      - name: Generar metricas de despliegue
        run: npm run metrics

      - name: Guardar entorno de liberacion
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-dist
          path: dist

      - name: Guardar reporte de metricas
        uses: actions/upload-artifact@v4
        with:
          name: metricas-despliegue
          path: reports

  despliegue:
    name: Despliegue continuo
    runs-on: ubuntu-latest
    needs: liberacion

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar entorno de liberacion
        uses: actions/download-artifact@v4
        with:
          name: calculadora-dist
          path: dist

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4